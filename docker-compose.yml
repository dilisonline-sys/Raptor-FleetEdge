services:
  raptor-fleetedge:
    build: .
    container_name: raptor-fleetedge
    restart: unless-stopped
    env_file: .env
    environment:
      # Agent manager + all spawned sub-agents write logs here.
      # Override any individual var by adding it to .env
      AGENT_NAME: raptor
      TZ: ${TZ:-Asia/Dubai}
    ports:
      - "7430:7430"   # agent manager dashboard
      - "7432:7432"   # testnet agent
      - "7433:7433"   # demo agent
      - "7434:7434"   # live agent slot 0
      - "7435:7435"   # live agent slot 1
      - "7436:7436"   # live agent slot 2
      - "7437:7437"   # live agent slot 3
      - "7438:7438"   # live agent slot 4 (EMA Cross)
    volumes:
      - rfe_logs:/tmp
      - ./.env:/app/.env
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7430/api/agents')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  rfe_logs:
